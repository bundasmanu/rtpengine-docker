[rtpengine]

templates = templates

##interfaces-config = interface
interface = internal/${LISTEN_IP_DEFAULT_INTERFACE};external/${LISTEN_IP_DEFAULT_INTERFACE}

listen-ng=${LISTEN_IP_NG}:${LISTEN_PORT_NG}
listen-cli=${LISTEN_IP_CLI}:${LISTEN_PORT_CLI}

num-threads=8

log-facility = local5
log-facility-cdr = local5
log-facility-rtcp = local5
log-stderr = false
log-level=7
log-name=${RTPENGINE_LOG_FILENAME}

foreground = false

delete-delay=10
timeout=120
silent-timeout=600
offer-timeout=7200

max-cpu = 95
scheduling = rr
priority = 99
idle-scheduling = rr
idle-priority = 10

recording-dir = ${RTPENGINE_RECORDINGS_DIR}
recording-method = pcap
recording-format = raw

port-min=${MIN_PORT_DEFAULT_INTERFACE}
port-max=${MAX_PORT_DEFAULT_INTERFACE}

[templates]
WebRTC = transport-protocol=UDP/TLS/RTP/SAVPF ICE=force trickle-ICE rtcp-mux=[offer require] no-rtcp-attribute SDES=off generate-mid
public-internal = transport-protocol=RTP/AVP codec-strip=all codec-offer=PCMA codec-offer=PCMU codec-transcode=PCMA,PCMU,g729,g722 replace-origin replace-session-connection via-branch=auto SDES-off direction=external direction=internal
public-external = transport-protocol=RTP/AVP codec-offer=PCMA,PCMU,g729,g722 codec-transcode=PCMA,PCMU,g729,g722 replace-origin replace-session-connection via-branch=auto SDES-off direction=internal direction=external
SRTP-public-internal = transport-protocol=RTP/SAVP codec-strip=all codec-offer=PCMA codec-offer=PCMU codec-transcode=PCMA,PCMU,g729,g722 SDES=on DTLS=off replace-origin replace-session-connection via-branch=auto direction=external direction=internal
SRTP-pubic-external = transport-protocol=RTP/SAVP codec-offer=PCMA,PCMU,g729,g722 codec-transcode=PCMA,PCMU,g729,g722 SDES=on DTLS=off replace-origin replace-session-connection via-branch=auto direction=internal direction=external

