apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-rtpengine-config
  labels:
    app: rtpengine
    release: {{ .Release.Name }}
data:
{{- range .Values.pods }}
  {{ .name }}.conf: |
    [rtpengine]
    transcode-config = transcode
    templates = templates
    interfaces-config = interface
    interface = {{ .listenIP }}
    listen-ng={{ .listenIP }}:{{ .ports.ng }}
    listen-cli={{ .listenIP }}:{{ .ports.cli }}
    num-threads=8
    log-facility = local5
    log-facility-cdr = local5
    log-facility-rtcp = local5
    log-stderr = false
    log-level=7
    log-name= {{ $.Values.rtpengine.logFilename }}
    foreground=false
    delete-delay=10
    timeout=120
    silent-timeout=600
    offer-timeout=7200
    max-cpu = 95
    scheduling = rr
    priority = 99
    idle-scheduling = rr
    idle-priority = 10
    recording-dir = {{ $.Values.rtpengine.recordingsDir }}
    recording-method = pcap
    recording-format = raw

    [interface-default]
    address = {{ .listenIP }}
    port-min={{ $.Values.rtpengine.defaultInterface.minPort }}
    port-max={{ $.Values.rtpengine.defaultInterface.maxPort }}
    template = RTP

    [transcode-1]
    source = PCMA
    destination = PCMU

    [transcode-2]
    source = G722
    destination = PCMA

    [transcode-3]
    source = GSM
    destination = PCMA

    [templates]
    WebRTC = transport-protocol=UDP/TLS/RTP/SAVPF ICE=force trickle-ICE rtcp-mux=[offer require] no-rtcp-attribute SDES=off generate-mid
    RTP = transport-protocol=RTP/AVP codec-transcode=pcma,pcmu replace-origin replace-session-connection via-branch=auto
{{- end }}
