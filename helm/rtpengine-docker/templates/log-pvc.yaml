{{- range .Values.pods }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-log-{{ .name }}-pvc
spec:
  accessModes:
    - {{ $.Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ $.Values.persistence.size }}
  storageClassName: {{ $.Values.persistence.storageClass | quote }}
---
{{- end }}
